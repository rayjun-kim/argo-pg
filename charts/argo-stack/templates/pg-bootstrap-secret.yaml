{{- if .Values.postgresql.enabled }}
{{- $opPw  := .Values.argo.passwords.operator | default (randAlphaNum 32) }}
{{- $lfPw  := .Values.argo.passwords.langflow | default (randAlphaNum 32) }}
---
# ARGO role passwords. Auto-generated when not set in values.yaml.
# `helm.sh/resource-policy: keep` prevents helm from regenerating them on
# upgrade — that would break Langflow's running connection.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argo-stack.fullname" . }}-argo-passwords
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  ARGO_OPERATOR_PASSWORD: {{ $opPw | quote }}
  ARGO_LANGFLOW_PASSWORD: {{ $lfPw | quote }}
{{- end }}

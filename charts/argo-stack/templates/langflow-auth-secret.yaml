{{- if and .Values.langflow.enabled .Values.langflow.auth.enabled (not .Values.langflow.auth.existingSecret) }}
{{- $pw := .Values.langflow.auth.superuserPassword | default (randAlphaNum 24) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argo-stack.fullname" . }}-langflow-auth
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  superuser-password: {{ $pw | quote }}
{{- end }}

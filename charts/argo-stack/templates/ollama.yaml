{{- if .Values.ollama.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argo-stack.ollamaService" . }}
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: {{ .Values.ollama.service.type }}
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: 11434
      protocol: TCP
  selector:
    {{- include "argo-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "argo-stack.ollamaService" . }}-models
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}
  {{- with .Values.ollama.storage.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
# Ollama Deployment: starts immediately without waiting for model download.
# Models are pulled asynchronously by the ollama-model-pull Job below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argo-stack.ollamaService" . }}
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "argo-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "argo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      {{- if .Values.ollama.gpu.enabled }}
      {{- with .Values.ollama.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.gpu.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.ollama.resources.requests.cpu | quote }}
              memory: {{ .Values.ollama.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.ollama.resources.limits.cpu | quote }}
              memory: {{ .Values.ollama.resources.limits.memory | quote }}
              {{- if .Values.ollama.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.ollama.gpu.count }}
              {{- end }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "argo-stack.ollamaService" . }}-models
---
# Async model pull Job: runs independently of --wait.
# Pulls models in the background while the rest of the stack comes up.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argo-stack.ollamaService" . }}-model-pull
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama-model-pull
  annotations:
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  # No backoffLimit cap — model pull should retry until success.
  backoffLimit: 10
  activeDeadlineSeconds: 7200   # 2 hours max
  template:
    metadata:
      labels:
        {{- include "argo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama-model-pull
    spec:
      restartPolicy: OnFailure
      containers:
        - name: puller
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              OLLAMA_HOST={{ include "argo-stack.ollamaService" . }}:{{ .Values.ollama.service.port }}

              echo "Waiting for Ollama to be ready..."
              for i in $(seq 1 60); do
                if curl -sf "http://${OLLAMA_HOST}/api/tags" > /dev/null 2>&1; then
                  echo "Ollama ready."
                  break
                fi
                echo "  waiting ($i)..."
                sleep 5
              done

              {{- range .Values.ollama.pullModels }}
              echo "Pulling {{ . }}..."
              OLLAMA_HOST=${OLLAMA_HOST} ollama pull {{ . | quote }}
              echo "{{ . }} ready."
              {{- end }}

              echo "All models pulled successfully."
          env:
            - name: OLLAMA_HOST
              value: "{{ include "argo-stack.ollamaService" . }}:{{ .Values.ollama.service.port }}"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "argo-stack.ollamaService" . }}-models
{{- end }}
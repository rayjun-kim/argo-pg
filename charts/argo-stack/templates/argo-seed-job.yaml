{{- if and .Values.postgresql.enabled .Values.argo.applySchema .Values.argo.seedExamples }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argo-stack.fullname" . }}-argo-seed
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        {{- include "argo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: argo-seed
    spec:
      serviceAccountName: {{ include "argo-stack.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ .Values.postgresql.imageName | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              for i in $(seq 1 60); do
                if pg_isready -h "$PGHOST" -p "$PGPORT" -U postgres > /dev/null 2>&1; then
                  echo "postgres ready"; break
                fi
                sleep 5
              done

              psql -v ON_ERROR_STOP=1 \
                   -h "$PGHOST" -p "$PGPORT" -U postgres -d "$PGDATABASE" << ENDSQL
              DO \$\$
              DECLARE
                  v_count INT;
              BEGIN
                  SELECT COUNT(*) INTO v_count
                  FROM argo_private.agent_meta
                  WHERE role_name = 'sample_chat';

                  IF v_count = 0 THEN
                      PERFORM argo_public.create_agent(
                          'sample_chat',
                          jsonb_build_object(
                              'name',          'Sample Chat',
                              'agent_role',    'executor',
                              'provider',      'ollama',
                              'endpoint',      '$OLLAMA_ENDPOINT',
                              'model_name',    '$CHAT_MODEL',
                              'system_prompt', 'You are a helpful assistant. When you have a final answer respond with JSON: {"action":"finish","final_answer":"..."}.'
                          )
                      );
                      RAISE NOTICE 'sample_chat agent created.';
                  ELSE
                      RAISE NOTICE 'sample_chat already exists, skipping.';
                  END IF;
              END \$\$;

              INSERT INTO argo_private.tool_registry
                  (name, description, input_schema, tool_type, mcp_server_url, mcp_server_name)
              VALUES
                  ('sample_search',
                   'Sample web search MCP tool. Replace mcp_server_url with a real MCP endpoint.',
                   '{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}'::jsonb,
                   'mcp',
                   'http://example-mcp:8080/sse',
                   'example-mcp')
              ON CONFLICT (name) DO NOTHING;

              INSERT INTO argo_private.agent_tool_permissions (agent_id, tool_id)
              SELECT a.agent_id, t.tool_id
              FROM argo_private.agent_meta a, argo_private.tool_registry t
              WHERE a.role_name = 'sample_chat' AND t.name = 'sample_search'
              ON CONFLICT DO NOTHING;

              INSERT INTO argo_private.flow_registry (flow_name, agent_id, webhook_url)
              SELECT 'ARGO Single Agent', a.agent_id, NULL
              FROM argo_private.agent_meta a
              WHERE a.role_name = 'sample_chat'
              ON CONFLICT (flow_name) DO NOTHING;
              ENDSQL

              echo "seed complete"
          env:
            - name: PGHOST
              value: {{ include "argo-stack.pgRwService" . | quote }}
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgresql.initdb.database | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "argo-stack.pgClusterName" . }}-superuser
                  key: password
            - name: OLLAMA_ENDPOINT
              value: {{ printf "http://%s:%d" (include "argo-stack.ollamaService" .) (int .Values.ollama.service.port) | quote }}
            - name: CHAT_MODEL
              value: {{ .Values.ollama.defaultChatModel | quote }}
{{- end }}
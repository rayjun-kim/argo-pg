{{- if and .Values.langflow.enabled .Values.langflow.importFlows }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argo-stack.fullname" . }}-langflow-import
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "argo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: langflow-import
    spec:
      serviceAccountName: {{ include "argo-stack.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: import
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              BASE="http://${LANGFLOW_HOST}:${LANGFLOW_PORT}"

              apk add --no-cache jq > /dev/null 2>&1

              echo "Waiting for Langflow..."
              for i in $(seq 1 60); do
                if curl -sf "$BASE/health" > /dev/null 2>&1; then
                  echo "Langflow ready."
                  break
                fi
                sleep 5
              done

              # Get auth token
              echo "Getting auth token..."
              TOKEN=$(curl -s "$BASE/api/v1/auto_login" \
                | grep -o '"access_token":"[^"]*"' \
                | cut -d'"' -f4)

              if [ -z "$TOKEN" ]; then
                TOKEN=$(curl -s -X POST "$BASE/api/v1/login" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "username=admin&password=admin" \
                  | grep -o '"access_token":"[^"]*"' \
                  | cut -d'"' -f4)
              fi

              if [ -z "$TOKEN" ]; then
                echo "Error: Could not get auth token"
                exit 1
              fi
              echo "Token obtained."

              # Delete existing ARGO flows first (so we always upload fresh)
              echo "Removing existing ARGO flows..."
              curl -s --compressed "$BASE/api/v1/flows/?page=1&size=100" \
                -H "Authorization: Bearer $TOKEN" \
                -o /tmp/existing_flows.json

              for flow_id in $(jq -r \
                  'if type == "array" then . else (.items // .flows // []) end |
                   .[] | select(.name | startswith("ARGO")) | .id' \
                  /tmp/existing_flows.json 2>/dev/null); do
                echo "  Deleting flow: $flow_id"
                curl -s -X DELETE "$BASE/api/v1/flows/$flow_id" \
                  -H "Authorization: Bearer $TOKEN" > /dev/null
              done

              # Upload all flows fresh
              for f in /flows/*.json; do
                FLOW_NAME=$(grep -o '"name":"[^"]*"' "$f" | head -1 | cut -d'"' -f4)
                echo "Uploading '$FLOW_NAME'..."
                code=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST "$BASE/api/v1/flows/upload/" \
                  -H "Authorization: Bearer $TOKEN" \
                  -F "file=@${f}")
                echo "  -> HTTP $code"
              done

              echo "Import complete."
          env:
            - name: LANGFLOW_HOST
              value: {{ include "argo-stack.langflowService" . | quote }}
            - name: LANGFLOW_PORT
              value: {{ .Values.langflow.service.port | quote }}
          volumeMounts:
            - name: flows
              mountPath: /flows
              readOnly: true
      volumes:
        - name: flows
          configMap:
            name: {{ include "argo-stack.fullname" . }}-langflow-flows
{{- end }}
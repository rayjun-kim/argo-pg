{{- if and .Values.langflow.enabled .Values.langflow.importFlows }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "argo-stack.fullname" . }}-langflow-import
  labels:
    {{- include "argo-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "argo-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: langflow-import
    spec:
      serviceAccountName: {{ include "argo-stack.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: import
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              BASE="http://${LANGFLOW_HOST}:${LANGFLOW_PORT}"

              echo "Waiting for Langflow..."
              for i in $(seq 1 60); do
                if curl -sf "$BASE/health" > /dev/null 2>&1; then
                  echo "Langflow ready."
                  break
                fi
                sleep 5
              done

              # Get auth token
              echo "Getting auth token..."
              TOKEN=$(curl -s -X POST "$BASE/api/v1/login" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "username=admin&password=admin" \
                | grep -o '"access_token":"[^"]*"' \
                | cut -d'"' -f4)

              if [ -z "$TOKEN" ]; then
                TOKEN=$(curl -s "$BASE/api/v1/auto_login" \
                  | grep -o '"access_token":"[^"]*"' \
                  | cut -d'"' -f4)
              fi

              if [ -z "$TOKEN" ]; then
                echo "Warning: Could not get token, trying without auth..."
                AUTH_HEADER=""
              else
                echo "Token obtained."
                AUTH_HEADER="Authorization: Bearer $TOKEN"
              fi

              # Fetch existing flow names to avoid duplicates
              echo "Fetching existing flows..."
              if [ -n "$AUTH_HEADER" ]; then
                EXISTING=$(curl -s "$BASE/api/v1/flows/?page=1&size=100" \
                  -H "$AUTH_HEADER" \
                  | grep -o '"name":"[^"]*"' \
                  | cut -d'"' -f4 || true)
              else
                EXISTING=$(curl -s "$BASE/api/v1/flows/?page=1&size=100" \
                  | grep -o '"name":"[^"]*"' \
                  | cut -d'"' -f4 || true)
              fi

              # Upload each flow only if its name doesn't already exist
              for f in /flows/*.json; do
                # Extract flow name from JSON
                FLOW_NAME=$(grep -o '"name":"[^"]*"' "$f" | head -1 | cut -d'"' -f4)

                if echo "$EXISTING" | grep -qF "$FLOW_NAME"; then
                  echo "  Skipping '$FLOW_NAME' (already exists)"
                  continue
                fi

                echo "Uploading '$FLOW_NAME'..."
                if [ -n "$AUTH_HEADER" ]; then
                  code=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X POST "$BASE/api/v1/flows/upload/" \
                    -H "$AUTH_HEADER" \
                    -F "file=@${f}" || true)
                else
                  code=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X POST "$BASE/api/v1/flows/upload/" \
                    -F "file=@${f}" || true)
                fi
                echo "  -> HTTP $code"
              done

              echo "Import complete."
          env:
            - name: LANGFLOW_HOST
              value: {{ include "argo-stack.langflowService" . | quote }}
            - name: LANGFLOW_PORT
              value: {{ .Values.langflow.service.port | quote }}
          volumeMounts:
            - name: flows
              mountPath: /flows
              readOnly: true
      volumes:
        - name: flows
          configMap:
            name: {{ include "argo-stack.fullname" . }}-langflow-flows
{{- end }}